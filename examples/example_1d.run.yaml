# Python-init 1D OSIRIS run spec -- first point of the parameter scan.
# This file is the single source of truth for the run. Generate with:
#   conda activate osiris2
#   python -m flash_osiris.generator --config examples/example_1d.run.yaml
# Every value is explicit (no hidden defaults); CLI flags override individual keys.
# Analysis reads the frozen copy written to <run_dir>/run.yaml.

data_path: /pscratch/sd/d/dschnei/FLASH_3D_noshield/MagShockZ_hdf5_plt_cnt_0009
dim: 1
inputfile_name: magshockz_rqm100_dx0.3_ppc500_g20
reference_density: 5.0e18      # cm^-3 (dot required so YAML parses as float)
rqm_factor: 100
dx: 0.1                         # c/omega_pe
ppc: 500
tmax_gyroperiods: 80
algorithm: cuda
node_number: [4]
num_threads: 1
n_dump_total: 512
restart: false

# Ion populations are auto-detected from the FLASH materials (this dump declares
# species=cham,targ,vac; cham=Al chamber, targ=Si target, vac=vacuum is dropped).
# `species_names` renames the OSIRIS species from the material field to a friendly name;
# here it reproduces the historical al/si names while separating by MATERIAL, not mass.
species_names: {cham: al, targ: si}

# Optional analysis-only metadata: physical ion charge states (the generator derives
# rqm/mass from FLASH and does NOT use these; downstream analysis that needs Z does).
charge_states: {al: 13, si: 14}

# 1D lineout endpoints in cm (x y z of the z-midplane).
# `extension` (cm, optional, default 0) appends a buffer beyond end_point whose fields are
# held constant at the endpoint value; it grows the OSIRIS domain (nx, particle/GPU counts)
# but adds no new physics. Must keep end_point strictly inside the FLASH domain.
geometry:
  start_point: [0, 0.07, 0]
  end_point: [0, 0.70, 0]
  extension: 0.0

solver:
  vpml_bnd_size: 100
  emf_boundary: [pmc, vpml]
  part_boundary: [thermal, thermal]
  interpolation: cubic
  smooth_type: binomial
  smooth_order: 2

diagnostics:
  n_ave: 6
  emf_reports: [b1, b2, b3, e1, e2, e3]
  reports: [charge, j1, j2, j3, q1, q2, q3]
  rep_udist: [uth1, uth2, ufl1, ufl2]
  phasespaces: [p1x1, p2x1, p3x1, gx1]
  e_ps_pmin: [-1, -1, -0.5]
  e_ps_pmax: [1, 1, 0.5]
  i_ps_pmin: [-0.1, -0.1, -0.05]
  i_ps_pmax: [0.1, 0.1, 0.05]
  ps_np: [4096, 4096, 4096]
  ps_ngamma: 128
  ps_gammamax: 3.0
  ps_nx: 1024
  ps_ny: 512
